{% extends 'base.html' %}

{% block content %}
<div class="auth-container glass-card">
    <h2 style="text-align: center; margin-bottom: 2rem; color: var(--primary);">Secure Login</h2>
    
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">Login</button>
    </form>
    
    <p style="text-align: center; margin-top: 1.5rem; color: #94a3b8;">
        Don't have an account? <a href="{% url 'register' %}" style="color: var(--primary);">Register securely</a>
    </p>
</div>
{% endblock %}
