{% extends 'base.html' %}

{% block content %}
<div class="auth-container glass-card">
    <h2 style="text-align: center; margin-bottom: 2rem; color: var(--primary);">Voter Registration</h2>
    
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">Register</button>
    </form>
    
    <p style="text-align: center; margin-top: 1.5rem; color: #94a3b8;">
        Already registered? <a href="{% url 'login' %}" style="color: var(--primary);">Login securely</a>
    </p>
</div>
{% endblock %}
